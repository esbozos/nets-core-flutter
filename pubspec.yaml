name: nets_core
description: Core UI components, networking, secure storage, push notifications, and utilities shared across Nets Flutter projects.
version: 0.1.14
homepage: https://github.com/esbozos/nets-core-flutter
repository: https://github.com/esbozos/nets-core-flutter
issue_tracker: https://github.com/esbozos/nets-core-flutter/issues

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.3.1
  camera: ^0.12.0+1
  collection: ^1.19.0
