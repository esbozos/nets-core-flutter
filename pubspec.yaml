  country_picker: ^2.0.26
  device_info_plus: ^12.1.0
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.2
  hooks_riverpod: ^3.0.2
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  jiffy: ^6.2.2
  webview_flutter: ^4.2.2

  intl: ^0.20.2
  flutter_hooks: ^0.21.3+1
  http: ^1.6.0
