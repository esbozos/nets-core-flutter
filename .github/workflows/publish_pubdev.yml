name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Validate tag matches pubspec version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PUBSPEC_VERSION="$(awk -F': *' '/^version:/ {print $2; exit}' pubspec.yaml | tr -d '\r' | xargs)"

          if [[ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match pubspec version ($PUBSPEC_VERSION)."
            exit 1
          fi

      - name: Install pub credentials
        shell: bash
        env:
          PUB_CREDENTIALS_JSON: ${{ secrets.PUB_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          if [[ -z "${PUB_CREDENTIALS_JSON:-}" ]]; then
            echo "Missing required secret: PUB_CREDENTIALS_JSON"
            exit 1
          fi

          # Dart has used different credential locations across versions.
          # Write the same credentials to both paths to keep CI compatible.
          mkdir -p "$HOME/.pub-cache"
          mkdir -p "$HOME/.config/dart"

          printf '%s' "$PUB_CREDENTIALS_JSON" > "$HOME/.pub-cache/credentials.json"
          printf '%s' "$PUB_CREDENTIALS_JSON" > "$HOME/.config/dart/pub-credentials.json"

      - name: Install dependencies
        run: flutter pub get

      - name: Publish package
        run: dart pub publish --force
